name: Deploy ROS Label Loop

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Deployment action"
        required: true
        default: "install"
        type: choice
        options:
          - install
          - start
          - restart
          - stop
          - status
      confirm_start:
        description: "Type START_ROBOT to allow start/restart"
        required: false
        default: ""
      task:
        description: "Robot task text. Include target slot in this text."
        required: false
        default: ""
      image_topic:
        description: "ROS1 camera topic"
        required: false
        default: "/camera1/image_compressed"
      raw_image:
        description: "Use sensor_msgs/Image instead of sensor_msgs/CompressedImage"
        required: false
        type: boolean
        default: false
      instruction_topic:
        description: "ROS1 std_msgs/String instruction topic"
        required: false
        default: "/opentau/pi05_instruction"
      stop_topic:
        description: "ROS1 std_msgs/String stop topic"
        required: false
        default: "/opentau/pi05_stop"
      publish_json:
        description: "Publish JSON commands instead of plain strings"
        required: false
        type: boolean
        default: false
      cycle_period_s:
        description: "Seconds between VLM cycles"
        required: false
        default: "1.0"
      device:
        description: "Qwen inference device"
        required: false
        default: "cuda"

permissions:
  contents: read

concurrency:
  group: ros-label-loop-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ROS1 robot server
    runs-on: ubuntu-latest
    environment: robot-server
    steps:
      - name: Validate robot start confirmation
        if: ${{ (inputs.action == 'start' || inputs.action == 'restart') && inputs.confirm_start != 'START_ROBOT' }}
        run: |
          echo "Refusing to start/restart robot control without confirm_start=START_ROBOT." >&2
          exit 1

      - name: Validate task for install/start/restart
        if: ${{ (inputs.action == 'install' || inputs.action == 'start' || inputs.action == 'restart') && inputs.task == '' }}
        run: |
          echo "task input is required for install/start/restart." >&2
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          lfs: false

      - name: Configure SSH
        env:
          ROBOT_SERVER_HOST: ${{ secrets.ROBOT_SERVER_HOST }}
          ROBOT_SERVER_PORT: ${{ secrets.ROBOT_SERVER_PORT }}
          ROBOT_SERVER_USER: ${{ secrets.ROBOT_SERVER_USER }}
          ROBOT_SERVER_SSH_KEY: ${{ secrets.ROBOT_SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$ROBOT_SERVER_HOST"
          test -n "$ROBOT_SERVER_USER"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ROBOT_SERVER_SSH_KEY" > ~/.ssh/robot_deploy_key
          chmod 600 ~/.ssh/robot_deploy_key
          ssh-keyscan -p "${ROBOT_SERVER_PORT:-22}" "$ROBOT_SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Copy source tree to server
        env:
          ROBOT_SERVER_HOST: ${{ secrets.ROBOT_SERVER_HOST }}
          ROBOT_SERVER_PORT: ${{ secrets.ROBOT_SERVER_PORT }}
          ROBOT_SERVER_USER: ${{ secrets.ROBOT_SERVER_USER }}
          ROBOT_DEPLOY_PATH: ${{ secrets.ROBOT_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${ROBOT_DEPLOY_PATH:-/opt/opentau}"
          SSH_TARGET="${ROBOT_SERVER_USER}@${ROBOT_SERVER_HOST}"
          SSH_PORT="${ROBOT_SERVER_PORT:-22}"
          SSH_OPTS="-i ~/.ssh/robot_deploy_key -p ${SSH_PORT}"
          SCP_OPTS="-i ~/.ssh/robot_deploy_key -P ${SSH_PORT}"
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            -czf /tmp/opentau-deploy.tar.gz .
          ssh $SSH_OPTS "$SSH_TARGET" "mkdir -p '$DEPLOY_PATH'"
          scp $SCP_OPTS /tmp/opentau-deploy.tar.gz "$SSH_TARGET:/tmp/opentau-deploy.tar.gz"
          ssh $SSH_OPTS "$SSH_TARGET" "tar -xzf /tmp/opentau-deploy.tar.gz -C '$DEPLOY_PATH' && rm /tmp/opentau-deploy.tar.gz"

      - name: Run remote deployment action
        env:
          ROBOT_SERVER_HOST: ${{ secrets.ROBOT_SERVER_HOST }}
          ROBOT_SERVER_PORT: ${{ secrets.ROBOT_SERVER_PORT }}
          ROBOT_SERVER_USER: ${{ secrets.ROBOT_SERVER_USER }}
          ROBOT_DEPLOY_PATH: ${{ secrets.ROBOT_DEPLOY_PATH }}
          ROBOT_ROS_SETUP: ${{ secrets.ROBOT_ROS_SETUP }}
          ROBOT_PYTHON_BIN: ${{ secrets.ROBOT_PYTHON_BIN }}
          ACTION: ${{ inputs.action }}
          TASK: ${{ inputs.task }}
          IMAGE_TOPIC: ${{ inputs.image_topic }}
          RAW_IMAGE: ${{ inputs.raw_image }}
          INSTRUCTION_TOPIC: ${{ inputs.instruction_topic }}
          STOP_TOPIC: ${{ inputs.stop_topic }}
          PUBLISH_JSON: ${{ inputs.publish_json }}
          CYCLE_PERIOD_S: ${{ inputs.cycle_period_s }}
          DEVICE: ${{ inputs.device }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${ROBOT_DEPLOY_PATH:-/opt/opentau}"
          ROS_SETUP="${ROBOT_ROS_SETUP:-/opt/ros/noetic/setup.bash}"
          PYTHON_BIN="${ROBOT_PYTHON_BIN:-python3}"
          SSH_TARGET="${ROBOT_SERVER_USER}@${ROBOT_SERVER_HOST}"
          SSH_OPTS="-i ~/.ssh/robot_deploy_key -p ${ROBOT_SERVER_PORT:-22}"
          REMOTE_ARGS=(
            --action "$ACTION"
            --repo-dir "$DEPLOY_PATH"
            --ros-setup "$ROS_SETUP"
            --python-bin "$PYTHON_BIN"
            --task "$TASK"
            --image-topic "$IMAGE_TOPIC"
            --instruction-topic "$INSTRUCTION_TOPIC"
            --stop-topic "$STOP_TOPIC"
            --cycle-period-s "$CYCLE_PERIOD_S"
            --device "$DEVICE"
          )
          if [[ "$RAW_IMAGE" == "true" ]]; then
            REMOTE_ARGS+=(--raw-image)
          fi
          if [[ "$PUBLISH_JSON" == "true" ]]; then
            REMOTE_ARGS+=(--publish-json)
          fi
          printf -v REMOTE_COMMAND '%q ' "$DEPLOY_PATH/scripts/deploy_ros_label_loop.sh" "${REMOTE_ARGS[@]}"
          ssh $SSH_OPTS "$SSH_TARGET" "$REMOTE_COMMAND"
